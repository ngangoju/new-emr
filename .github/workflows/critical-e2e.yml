name: Critical E2E

on:
  workflow_dispatch:
    inputs:
      playwright_base_url:
        description: Frontend base URL to test (defaults to repo variable PLAYWRIGHT_BASE_URL)
        required: false
        type: string
      auth_api_base:
        description: Backend auth/API base URL (defaults to repo variable E2E_AUTH_API_BASE)
        required: false
        type: string
      e2e_username:
        description: Doctor username used for generic login smoke (defaults to repo variable E2E_USERNAME or doctor1)
        required: false
        type: string
  schedule:
    - cron: '0 3 * * *'

permissions:
  contents: read

jobs:
  critical-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PLAYWRIGHT_BASE_URL: ${{ github.event.inputs.playwright_base_url != '' && github.event.inputs.playwright_base_url || vars.PLAYWRIGHT_BASE_URL }}
      E2E_AUTH_API_BASE: ${{ github.event.inputs.auth_api_base != '' && github.event.inputs.auth_api_base || vars.E2E_AUTH_API_BASE }}
      E2E_USERNAME: ${{ github.event.inputs.e2e_username != '' && github.event.inputs.e2e_username || vars.E2E_USERNAME || 'doctor1' }}
      E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate E2E environment
        id: validate
        run: |
          missing=0
          for name in PLAYWRIGHT_BASE_URL E2E_AUTH_API_BASE E2E_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "::warning title=Missing E2E configuration::Set ${name} via workflow input, repository variable, or secret before running Critical E2E."
              missing=1
            fi
          done

          # Pre-flight: the E2E suite depends on a reachable live backend. When the
          # deployed backend (Render/Vercel) is spun down or unreachable, the tests
          # would fail red on an environment outage rather than a code defect. Treat
          # an unreachable backend as a neutral skip for scheduled runs (so CI stays
          # green between real deployments) and a hard error for manual dispatches.
          if [ "$missing" -eq 0 ]; then
            health_url="${E2E_AUTH_API_BASE}/actuator/health"
            if ! curl --silent --fail --max-time 20 "$health_url" >/dev/null; then
              echo "::warning title=Backend unreachable::${health_url} did not respond. Skipping E2E (environment outage, not a code defect)."
              missing=2
            fi
          fi

          if [ "$missing" -ne 0 ]; then
            if [ "$missing" -eq 2 ] && [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              echo "::error title=Backend unreachable::${E2E_AUTH_API_BASE}/actuator/health did not respond. Deploy/start the backend before running Critical E2E manually."
              exit 1
            fi
            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              echo "::error title=Missing required E2E configuration::Running Critical E2E manually requires PLAYWRIGHT_BASE_URL, E2E_AUTH_API_BASE, and E2E_PASSWORD to be set."
              exit 1
            fi
            echo "E2E configuration not set or backend unreachable — skipping scheduled run (set the repo variables/secrets and ensure the backend is deployed to enable)."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Playwright Chromium
        if: steps.validate.outputs.skip != 'true'
        run: npx playwright install --with-deps chromium

      - name: Run critical browser flows
        if: steps.validate.outputs.skip != 'true'
        env:
          CI: true
        run: npm run test:e2e:critical

      - name: Upload Playwright report
        if: always() && steps.validate.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-critical-report
          path: |
            playwright-report
            test-results
