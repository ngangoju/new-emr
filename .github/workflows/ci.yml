name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (changed-files-only)
        run: |
          set -euo pipefail

          git fetch origin main

          CHANGED_FE_FILES=()
          while IFS= read -r f; do
            case "$f" in
              *.js|*.jsx|*.ts|*.tsx) CHANGED_FE_FILES+=("$f");;
            esac
          done < <(git diff --name-only --diff-filter=ACMRT origin/main...HEAD)

          if [ ${#CHANGED_FE_FILES[@]} -eq 0 ]; then
            echo "No frontend JS/TS files changed; skipping eslint."
            exit 0
          fi

          printf '%s\n' "Linting frontend files:" "${CHANGED_FE_FILES[@]}"

          npm run lint -- --max-warnings=0 "${CHANGED_FE_FILES[@]}"

      - name: Unit tests (Vitest)
        env:
          CI: true
        run: npm run test -- run

